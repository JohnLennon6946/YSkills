name: sdd
version: 2
description: 规范驱动开发（Spec-Driven Development）通用工作流，技术栈无关
artifacts:
  - id: prd
    generates: PRD.md
    description: 产品需求文档 - 原始需求输入（WHY）
    template: PRD.md
    instruction: |
      创建产品需求文档。这是一切的起点——定义要做什么、为什么做。

      ## 创建流程

      1. **收集信息**：向用户了解需求背景、核心功能、目标用户
      2. **搜索项目代码**：用 Grep/Glob 搜索需求相关的关键词，了解现有实现
      3. **按模板填写**：基于收集的信息和代码探索结果填写 PRD
      4. **完整度自检**：按下方检查维度逐项确认
      5. **追问模糊点**：发现模糊描述时主动向用户追问

      ## 必须包含（P0 维度，影响技术方案）

      - 需求概述：一句话说清楚这个需求，无歧义
      - 核心功能：功能点列表，每个功能有明确边界
      - 用户场景：入口位置、触发条件、操作流程
      - 边界条件：异常情况、限制条件、错误处理

      ## 建议包含（P1 维度，影响开发细节）

      - 交互细节：UI 状态、提示文案、动画效果
      - 性能要求：响应时间、数据量级
      - 兼容性：版本要求、降级方案
      - 数据要求：数据来源、缓存策略

      ## 模糊检测规则

      填写时主动检测并追问以下模糊描述：
      - 量词模糊（多个、一些、若干）→ 追问具体数量或范围
      - 动词模糊（处理、支持、优化）→ 追问具体行为和结果
      - 条件缺失（如果...则...，无 else）→ 追问其他情况如何处理
      - 主语不明（可以查看、能够操作）→ 追问谁可以、权限要求
      - 时机不明（显示提示、触发刷新）→ 追问什么时候、什么条件下
      - 位置不明（在页面上展示）→ 追问具体在哪个页面、什么位置

      ## 代码探索建议

      创建前搜索项目中与需求相关的关键词，了解：
      - 现有实现可复用的部分
      - 已有的数据模型和字段
      - 现有代码的错误处理策略

      ## 模糊词替换

      发现以下模糊词时，必须替换为具体描述：
      - "快速" → 具体毫秒数或相对基准
      - "合理" → 具体规则或阈值
      - "友好" → 具体的交互行为
      - "大量" → 具体数量或数量级
      - "适当" → 具体条件和处理方式

      ## 验收标准

      每条核心功能对应至少一个可验证的验收标准：
      - 格式："做了某操作 → 出现某结果"
      - 避免"提升用户体验"这类无法验证的描述

      ## 非目标识别

      从需求的隐含边界中提炼不做的事：
      - 只提到 A 平台 → 非目标：本期不支持 B 平台
      - 只提到查看 → 非目标：本期不支持编辑
      - 未提到离线 → 非目标：不考虑离线场景

      ## 能力声明（Capabilities）

      声明本次变更涉及的能力，每个能力会创建对应的 spec 文件。
      这是 PRD 和 specs 阶段之间的约定——PRD 中声明的每个能力，
      后续都需要一个对应的 specs/<name>/spec.md 文件。

      ### 新增能力（New Capabilities）

      列出本次新增的能力，使用 kebab-case 命名（如 user-auth、data-export）。
      每个能力会创建 specs/<name>/spec.md 文件。
      格式：`<name>`: <简要描述这个能力涵盖的内容>

      ### 修改能力（Modified Capabilities）

      列出本次修改的已有能力。只有需求级别的行为变化才列在这里，
      纯实现细节的改动不算。使用 ravenspec/specs/ 中已有的 spec 名称。
      每个修改都需要一个 delta spec 文件。
      如无修改，留空或写"无"。

      创建前先查看 ravenspec/specs/ 了解已有的能力名称。
    requires: []
  - id: specs
    generates: specs/**/*.md
    description: 能力规范 - 定义新增/修改的能力详细规范（WHAT）
    template: spec.md
    instruction: |
      基于 PRD 中声明的 Capabilities，为每个能力创建 spec 文件。

      ## 创建规则

      - 新增能力：使用 PRD 中声明的 kebab-case 名称，创建 specs/<name>/spec.md
      - 修改能力：使用 ravenspec/specs/<name>/ 中已有的名称，创建 delta spec

      ## Delta 操作类型（使用 ## 标题）

      - **ADDED Requirements**：新增的需求
      - **MODIFIED Requirements**：变更的需求——必须包含完整的更新后内容
      - **REMOVED Requirements**：废弃的需求——必须包含 **Reason** 和 **Migration**
      - **RENAMED Requirements**：仅改名——使用 FROM:/TO: 格式

      ## 格式要求

      - 每个需求：`### Requirement: <名称>`，后接描述
      - 使用"必须"/"应当"等明确语气，避免"可以"/"也许"
      - 每个场景：`#### Scenario: <名称>`，使用 WHEN/THEN 格式
      - **关键**：场景标题必须用 4 个 `#`（`####`），不能用 3 个或列表格式
      - 每个需求至少包含一个场景

      ## MODIFIED 需求的工作流

      1. 在 ravenspec/specs/<name>/spec.md 中找到原始需求
      2. 完整复制该需求块（从 `### Requirement:` 到所有场景）
      3. 粘贴到 `## MODIFIED Requirements` 下，修改为新的行为
      4. 确保标题文本完全匹配（忽略空格差异）

      注意：MODIFIED 如果只写部分内容，归档时会丢失细节。
      如果只是新增关注点而不改变现有行为，应使用 ADDED。

      ## 示例

      ```
      ## ADDED Requirements

      ### Requirement: 用户可以导出数据
      系统必须允许用户以 CSV 格式导出数据。

      #### Scenario: 成功导出
      - **WHEN** 用户点击"导出"按钮
      - **THEN** 系统下载包含所有用户数据的 CSV 文件
      ```

      每个场景都是一个潜在的测试用例，确保 spec 可被验证。
    requires:
      - prd
  - id: findings
    generates: FINDINGS.md
    description: 发现与决策 - 踩坑记录和技术决策（运行时持续更新）
    template: FINDINGS.md
    instruction: |
      创建发现与决策记录文档。这是开发过程中的知识沉淀载体。

      ## 初始创建内容

      - 技术决策：从 PRD 阶段已做出的关键决策中提取，填入初始条目
      - 踩坑记录：留空，开发过程中持续填充
      - 变更摘要：留空，每次提交时更新

      ## 三类记录格式

      ### 技术决策

      每个决策记录：
      ```
      ## [决策标题]
      - **选择**：选了什么方案
      - **理由**：为什么选这个（关键考量）
      - **放弃方案**：考虑过但放弃的方案及原因
      ```

      ### 踩坑记录

      每个踩坑记录：
      ```
      ## [问题标题]
      - **现象**：观察到什么问题
      - **根因**：经排查发现的根本原因
      - **解决方案**：最终的解决方式
      ```

      ### 变更摘要

      每次提交时更新：
      ```
      | 日期 | 变更内容 | 原因 | 影响范围 |
      ```

      ## 更新时机

      - 做出技术决策时 → 记录到「技术决策」
      - 踩坑并解决时 → 记录到「踩坑记录」
      - 每次代码提交时 → 更新「变更摘要」
      - 发现与预期不符的行为时 → 记录到「踩坑记录」
    requires:
      - prd
  - id: design
    generates: DESIGN.md
    description: 技术方案 - 定义怎么实现（HOW）
    template: DESIGN.md
    instruction: |
      基于 PRD.md 创建技术方案。回答"具体怎么做"。

      ## 创建前准备

      先搜索项目代码了解现有实现：
      - 用 Grep 搜索 PRD 中提到的关键词、类名、API 名
      - 用 Glob 查找相关模块的文件结构
      - 了解现有架构模式，确保方案与之兼容

      ## 必须包含

      - 方案概述：一两句话说清楚整体思路
      - 关键决策：每个决策说明选了什么、为什么、考虑过什么备选
      - 改动范围：列出要改哪些文件、改什么
      - 关键接口：新增或修改的接口，用项目实际语言写
      - 风险与边界：已知风险和应对策略

      ## 关键决策格式

      每个决策必须包含：
      ```
      ### [决策标题]
      **选择**：[具体方案]
      **理由**：[核心考量，why X over Y]
      **备选**：[考虑过但放弃的方案及原因]
      ```

      ## 关键原则

      - 每个决策必须有理由（why X over Y）
      - 接口用项目实际语言写（不要用伪代码）
      - 聚焦方案，不要写具体实现代码
    requires:
      - prd
  - id: task
    generates: TASK.md
    description: 实现任务 - 任务拆分与进度追踪（TODO）
    template: TASK.md
    instruction: |
      基于 DESIGN.md 和 specs 将实现拆分为具体可执行的任务。

      ## 格式要求

      - 任务按 Phase 分组（## Phase N: 分组名称）
      - Phase 内按依赖排序
      - 每个任务用 checkbox：- [ ] N.M 任务描述
      - 有依赖的任务标注：`blockedBy: N.M, N.M`

      ## 任务粒度标准

      | 太大（需拆分） | 合适 | 太小（应合并） |
      |---|---|---|
      | 实现整个模块 | 实现 X 组件的 Y 功能 | 添加一行 import |
      | 完成播放器页面 | 实现 PlaybackManager | 定义 PlaybackState 枚举 |
      | 重构数据层 | 实现 UserStore 状态管理 | 添加一个 getter 方法 |

      判断标准：一个任务 = AI 在一次对话中能完成的、完成后可独立验证的工作单元。

      ## Phase 分组规则

      - **Phase 1**：无依赖的基础任务（类型定义、接口定义、基础配置）
      - **Phase 2**：核心实现（依赖 Phase 1 的主要功能实现）
      - **Phase 3+**：集成与验证（依赖前面 Phase 的集成、联调、测试任务）

      ## 依赖管理

      - 依赖格式：`blockedBy: 1.1, 1.2`
      - 只写直接依赖，不写传递依赖
      - 检查是否存在循环依赖（A→B→C→A），如有则调整任务划分

      ## 每个任务必须明确

      - 具体改动哪个文件或模块
      - 完成标准是什么（编译通过、测试通过、功能可用等）
      - 如有依赖，明确 blockedBy 哪些任务

      ## 关键原则

      - Phase 1 任务全部无依赖，可并行执行
      - 最后一个 Phase 包含集成验证和测试
      - 每个任务都要可独立验证
    requires:
      - specs
      - design
apply:
  requires:
    - task
  tracks: TASK.md
